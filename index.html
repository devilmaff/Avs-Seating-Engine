<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avs Seating Engine</title>
    <!-- Use Inter font for a professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-wrapper">
        <div class="login-box">
            <h2>Avs Seating Engine</h2>
            <p>Please enter your credentials to continue</p>
            <div class="input-group">
                <input type="text" id="loginUsername" placeholder="Username">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <button class="btn btn-primary" onclick="checkLogin()">Login</button>
            <p id="loginError" style="color: red; margin-top: 10px; display: none; font-size: 0.9rem;">Invalid Username or Password</p>
        </div>
    </div>

    <div class="app-container" id="main-app" style="display: none;">
        <!-- Configuration Panel -->
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                Avs Seating Engine
            </div>
        </header>

        <main>
            <div class="panel">
                <h2 class="section-title">Exam Details</h2>
                <div class="form-section">
                    <div class="input-group">
                        <label>Test Name</label>
                        <input type="text" id="testName" value="INTERNAL ASSESSMENT TEST-2">
                    </div>
                    <div class="input-group">
                        <label>Hall No</label>
                        <input type="text" id="hallNo" value="II ECE">
                    </div>
                    <div class="input-group">
                        <label>Session</label>
                        <input type="text" id="session" value="AN">
                    </div>
                    <div class="input-group">
                        <label>Seating Day</label>
                        <input type="text" id="seatingDay" value="WEDNESDAY">
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 24px;">Signatures & Authorities</h2>
                <div class="form-section">
                    <div class="input-group">
                        <label>Left Signature</label>
                        <input type="text" id="leftSignature" value="EC">
                    </div>
                    <div class="input-group">
                        <label>Center Signature</label>
                        <input type="text" id="centerSignature" value="HOD">
                    </div>
                    <div class="input-group">
                        <label>Right Signature</label>
                        <input type="text" id="rightSignature" value="PRINCIPAL">
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 24px;">Seating Strategy & Data</h2>
                <div class="form-section">
                    <div class="input-group">
                        <label>Mode</label>
                        <select id="fileCount" onchange="toggleFile2()">
                            <option value="1">1 File (Sequential)</option>
                            <option value="2">2 Files (Mix Classes - A|B|A|B)</option>
                            <option value="3" selected>2 Files (Sequential Split)</option>
                        </select>
                    </div>
                    <div class="input-group" id="bench-container">
                        <label>Persons / Bench</label>
                        <select id="personsPerBench">
                            <option value="2" selected>2 per bench (A & B)</option>
                            <option value="3">3 per bench (A, B & C)</option>
                        </select>
                    </div>
                    <div class="input-group" style="display:none;">
                        <label>Rows / Box</label>
                        <input type="number" id="rowsPerCol" value="6" min="1" max="20">
                    </div>
                </div>

                <div class="form-section">
                    <div class="input-group file-group">
                        <label>Upload File 1 (.xlsx)</label>
                        <input type="file" id="file1" accept=".xlsx, .xls">
                    </div>
                    <div class="input-group file-group" id="file2-container">
                        <label>Upload File 2 (.xlsx)</label>
                        <input type="file" id="file2" accept=".xlsx, .xls">
                    </div>
                </div>

                <div class="btn-wrapper">
                    <!-- <button class="btn btn-outline" onclick="loadDummyData()" style="margin-right: auto;">Load Sample
                        Data</button> -->
                    <button class="btn btn-primary" onclick="generateSeatingUI()">Generate Seating Table</button>
                </div>
            </div>

            <!-- Printing Output Area -->
            <div class="preview-panel" id="print-area">
                <div class="empty-state">No tables generated yet.<br>Configure settings and generate seating above.
                </div>
            </div>

            <input type="file" id="continueFile" accept=".xlsx, .xls" style="display: none;"
                onchange="handleContinueFile(this)">
        </main>
    </div>

    <!-- Custom Modal Overlay -->
    <div id="custom-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Prompt</div>
            <div class="modal-body" id="modal-text"></div>
            <input type="text" id="modal-input" class="modal-input" style="display: none;">
            <div class="modal-buttons">
                <button type="button" id="modal-cancel-btn" class="btn-cancel">Cancel</button>
                <button type="button" id="modal-confirm-btn" class="btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
